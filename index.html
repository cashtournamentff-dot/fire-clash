<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE CLASH</title>
    <style>
        :root { --bg-dark: #060b13; --accent-yellow: #FFB301; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-dark); color: white; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1a1f29; }
        .wallet-badge { background: #fff; color: #000; padding: 5px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .game-item { cursor: pointer; text-align: center; }
        .game-img-box { background: #1c2128; aspect-ratio: 1/1; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .game-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .game-label { background: #1c2128; font-size: 10px; padding: 5px; border-radius: 4px; margin-top: 5px; display: flex; justify-content: space-between; font-weight: bold; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>
    <div class="header">
        <div><small>Welcome Back,</small><br><b>Fire Clash</b></div>
        <div class="wallet-badge">💰 0.00</div>
    </div>

    <div class="game-grid">
        <div class="game-item" onclick="openMatch('Bermuda Tournament', 'https://i.postimg.cc/kGkkCkHh/file-000000005dc47208ae6db87230e677bd.png', '100', 'FREE', 'Solo', '48')">
            <div class="game-img-box"><img src="https://i.postimg.cc/kGkkCkHh/file-000000005dc47208ae6db87230e677bd.png"></div>
            <div class="game-label"><span>Bermuda</span><span>₹0</span></div>
        </div>
        <div class="game-item" onclick="openMatch('CS 1VS1', 'https://i.postimg.cc/pX24tJy4/file-000000009518720bac36aa8bb9de95ea.png', '50', '10', '1VS1', '2')">
            <div class="game-img-box"><img src="https://i.postimg.cc/pX24tJy4/file-000000009518720bac36aa8bb9de95ea.png"></div>
            <div class="game-label"><span>CS</span><span>1VS1</span></div>
        </div>
    </div>

    <div class="bottom-nav">
        <span>💰 Earn</span><span style="color: white;">🎮 Play</span><span>👤 Account</span>
    </div>

    <script>
        function openMatch(name, img, prize, entry, type, slots) {
            localStorage.setItem('m_name', name);
            localStorage.setItem('m_img', img);
            localStorage.setItem('m_prize', prize);
            localStorage.setItem('m_entry', entry);
            localStorage.setItem('m_type', type);
            localStorage.setItem('m_slots', slots);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
