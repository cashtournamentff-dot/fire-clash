<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASHH TOURNAMENT FF</title>
    <style>
        :root {
            --bg-dark: #060b13;
            --accent-yellow: #FFB301;
            --whatsapp-green: #25D366;
            --telegram-blue: #0088cc;
            --card-dark: #111721;
            --wallet-blue: #001529;
            --purple-btn: #7000ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
        }

        /* --- LOADING SCREEN --- */
        #loading-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .progress-container {
            width: 75%; height: 10px;
            background: #222; border-radius: 10px;
            margin: 20px 0; overflow: hidden;
            border: 1px solid #444;
        }
        .progress-bar {
            width: 0%; height: 100%;
            background: #fff;
            transition: width 3s linear;
        }
        #status-text { font-size: 16px; color: #fff; font-weight: bold; }
        .status-green { color: #00FF00 !important; }

        /* --- MAIN APP --- */
        #app-content { display:none; }
        
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: #1a1f29;
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: orange; border: 1.5px solid white; }
        .wallet-badge { background: #fff; color: #000; padding: 4px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .page { padding: 15px; padding-bottom: 80px; }
        .page-content { display: none; }
        .page-content.active { display: block; }

        .section-label { text-align: center; margin: 15px 0; font-weight: bold; font-size: 14px; color: #eee; }

        /* Tournament Card Style */
        .match-card {
            background: #111721;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .match-header {
            background: var(--accent-yellow);
            color: black;
            padding: 5px 15px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
        .match-body { padding: 15px; }
        .match-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
            margin-bottom: 15px;
        }
        .stat-val { display: block; font-weight: bold; color: white; font-size: 16px; }
        .stat-lbl { font-size: 10px; color: #888; text-transform: uppercase; }

        .btn-join {
            width: 100%;
            background: var(--purple-btn);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 100; }
        .nav-item { text-align: center; color: #888; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h2 style="color: #FFB301;">CASHH TOURNAMENT FF</h2>
        <div class="progress-container"><div class="progress-bar" id="pbar"></div></div>
        <p id="status-text">Connecting Server...</p>
    </div>

    <div id="app-content">
        <div id="app-header" class="header">
            <div class="user-info">
                <div class="avatar"></div>
                <div>
                    <div style="font-size: 10px; color: #888;">Welcome Back,</div>
                    <div style="font-size: 14px; font-weight: bold;">FireXbattle</div>
                </div>
            </div>
            <div class="wallet-badge" onclick="showWallet()">💰 0.00</div>
        </div>

        <div class="page">
            <div id="play-page" class="page-content active">
                <div class="section-label">LIVE TOURNAMENTS</div>
                
                <div class="match-card">
                    <div class="match-header">
                        <span id="fMatchName">LOADING...</span>
                        <span>BERMUDA</span>
                    </div>
                    <div class="match-body">
                        <div class="match-stats">
                            <div><span class="stat-lbl">Win Prize</span><span class="stat-val">₹<span id="fPrize">0</span></span></div>
                            <div><span class="stat-lbl">Entry Fee</span><span class="stat-val">₹<span id="fEntry">0</span></span></div>
                            <div><span class="stat-lbl">Type</span><span class="stat-val">SOLO</span></div>
                        </div>
                        <button class="btn-join" onclick="alert('Joining Match...')">JOIN NOW</button>
                    </div>
                </div>
            </div>

            </div>

        <div class="bottom-nav">
            <div class="nav-item" onclick="navTo('earn')">💰<br>Earn</div>
            <div class="nav-item active" onclick="navTo('play')">🎮<br>Play</div>
            <div class="nav-item" onclick="navTo('account')">👤<br>Account</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANxMtv6HQwQONKXM-wZ7UxKvvCy1MYsNg",
            authDomain: "fire-clash-999a7.firebaseapp.com",
            projectId: "fire-clash-999a7",
            storageBucket: "fire-clash-999a7.firebasestorage.app",
            databaseURL: "https://fire-clash-999a7-default-rtdb.firebaseio.com",
            messagingSenderId: "896687403596",
            appId: "1:896687403596:web:9a07786167bdb520557ae9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Firebase Data Fetching
        const matchRef = ref(db, 'match1');
        onValue(matchRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('fMatchName').innerText = data.name;
                document.getElementById('fPrize').innerText = data.prize;
                document.getElementById('fEntry').innerText = data.entry;
            }
        });

        // Loading Screen Logic
        window.onload = function() {
            setTimeout(() => { document.getElementById('pbar').style.width = '100%'; }, 100);
            setTimeout(() => {
                document.getElementById('status-text').innerText = "Server Connected ✓";
                document.getElementById('status-text').classList.add('status-green');
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                }, 500); 
            }, 3000);
        };
    </script>
</body>
</html>
