<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #060b13; color: white; }
        
        /* --- HEADER WITH BACK ARROW --- */
        .header { 
            display: flex; 
            align-items: center; 
            padding: 15px; 
            background: #1a1f29; 
            border-bottom: 1px solid #333; 
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-btn { 
            font-size: 30px; /* Bada teer */
            cursor: pointer; 
            color: #FFB301; /* Pila color taaki saaf dikhe */
            text-decoration: none; 
            margin-right: 20px; 
            font-weight: bold;
            display: inline-block;
            line-height: 1;
        }
        
        .banner { width: 100%; height: 210px; object-fit: cover; }
        
        .details-box { padding: 20px; background: white; color: black; border-radius: 0 0 20px 20px; }
        .match-title { font-size: 20px; font-weight: bold; margin: 0; }
        
        .stats-row { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 20px; 
            border-top: 1px solid #eee; 
            padding-top: 15px; 
        }
        .stat-item { text-align: center; flex: 1; }
        .stat-item small { color: #888; font-size: 10px; text-transform: uppercase; }
        .stat-item b { display: block; font-size: 14px; margin-top: 4px; }

        /* --- FOOTER JOIN SECTION --- */
        .footer { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            padding: 15px; 
            background: white; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-sizing: border-box; 
            border-top: 1px solid #eee; 
        }
        .slot-info { color: #444; font-size: 13px; font-weight: bold; }
        .join-btn { 
            background: #000; 
            color: white; 
            padding: 12px 35px; 
            border-radius: 8px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">←</a> 
        <div id="nav-name" style="font-weight: bold; font-size: 16px; color: white;">MATCH DETAILS</div>
    </div>

    <img id="m-img" class="banner" src="">

    <div class="details-box">
        <h2 id="m-name" class="match-title">Match Name</h2>
        <p style="font-size: 11px; color: #666; margin-top: 5px;">Map: Bermuda | Mode: Battle Royale</p>
        
        <div class="stats-row">
            <div class="stat-item"><small>Prize Pool</small><b id="m-prize">₹0</b></div>
            <div class="stat-item"><small>Entry Fee</small><b id="m-entry">FREE</b></div>
            <div class="stat-item"><small>Type</small><b id="m-type">Solo</b></div>
        </div>
    </div>

    <div class="footer">
        <div class="slot-info" id="m-slots">0/48 Joined</div>
        <button class="join-btn">JOIN NOW</button>
    </div>

    <script>
        // Data Loading from index.html clicks
        document.getElementById('m-name').innerText = localStorage.getItem('m_name') || "Tournament";
        document.getElementById('nav-name').innerText = localStorage.getItem('m_name') || "Details";
        document.getElementById('m-img').src = localStorage.getItem('m_img') || "";
        document.getElementById('m-prize').innerText = "₹" + (localStorage.getItem('m_prize') || "0");
        document.getElementById('m-entry').innerText = localStorage.getItem('m_entry') || "FREE";
        document.getElementById('m-type').innerText = localStorage.getItem('m_type') || "Solo";
        document.getElementById('m-slots').innerText = "0/" + (localStorage.getItem('m_slots') || "48") + " Joined";
    </script>

</body>
</html>
